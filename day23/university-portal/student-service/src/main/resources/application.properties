spring.application.name=student-service
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/university_db
spring.datasource.username=root
spring.datasource.password=root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ????????????????????????????????????????????????
# ACTUATOR CONFIGURATION ? NEW SECTION
# ????????????????????????????????????????????????

# ?? Which endpoints to expose over HTTP ??????????
# '*' means all. In production, list only what you need.
# Example for production: health,info,metrics,prometheus
management.endpoints.web.exposure.include=*

# ?? Change the base path (default is /actuator) ??
# Good for avoiding conflicts and clarity
management.endpoints.web.base-path=/actuator

# ?? Health endpoint configuration ????????????????
# always: show full health details (NEVER in public production!)
# when-authorized: show details only to authenticated users
# never: just show UP/DOWN (safe for public load balancers)
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# ?? Info endpoint: add app metadata ??????????????
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
management.info.build.enabled=true

# ?? App info shown at /actuator/info ?????????????
info.app.name=University Student Service
info.app.description=Manages student registrations for the university portal
info.app.version=1.0.0
info.app.team=Backend Platform Team
info.app.contact=platform@university.edu
info.university.name=National University of Technology
info.university.founded=1985

# ?? Metrics configuration ?????????????????????????
# Add common tags to ALL metrics (useful in Grafana dashboards)
management.metrics.tags.application=student-service
management.metrics.tags.environment=development

# Enable specific metric groups
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.tomcat=true

# ?? Loggers endpoint ??????????????????????????????
# Allows changing log levels at runtime via POST request!
management.endpoint.loggers.enabled=true

# ?? Shutdown endpoint (DANGEROUS ? disabled by default) ??
# Allows shutting down the app via HTTP POST. Only enable in dev.
management.endpoint.shutdown.enabled=false

# ?? HTTP Tracing (last N requests) ???????????????
management.endpoint.httptrace.enabled=true

# ?? Separate management port (BEST PRACTICE for production) ??
# Your business API runs on 8081
# Actuator runs on 8091 ? unreachable from public internet
management.server.port=8081