server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/product_db
spring.datasource.username=demo_user
spring.datasource.password=demo1234
spring.application.name=product-service
spring.config.import=configserver:http://localhost:8888
spring.cloud.config.fail-fast=true

# ?? KAFKA CONSUMER ??????????????????????????????????????????????
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=product-service-group
# All instances of product-service share this group-id
# Kafka distributes partitions across group members ? each message processed ONCE

spring.kafka.consumer.auto-offset-reset=earliest
# earliest = start from the beginning of the topic on first run
# latest = start from NOW (skip historical messages)
# Use "earliest" in dev/test, "latest" in production for new deployments

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.revature.springcloud.product_service.event.OrderPlacedEvent
# Tell JsonDeserializer what class to deserialize the JSON into