spring.application.name=order-service

server.port=8082

#MYSQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/order_db
spring.datasource.username=demo_user
spring.datasource.password=demo1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#Tell order service where Eureka is
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

#Feign timeout config
spring.cloud.openfeign.client.config.default.connect-timeout=2000
spring.cloud.openfeign.client.config.default.read-timeout=5000

# Enable Feign + Resilience4j integration
spring.cloud.openfeign.circuitbreaker.enabled=true

# ?? CIRCUIT BREAKER CONFIG ?????????????????????????????????????
resilience4j.circuitbreaker.instances.product-service.sliding-window-size=5
# Look at the last 5 calls

resilience4j.circuitbreaker.instances.product-service.failure-rate-threshold=50
# If 50% of last 5 calls failed (= 3 failures) ? OPEN the circuit

resilience4j.circuitbreaker.instances.product-service.minimum-number-of-calls=3
# Don't open until at least 3 calls have been made

resilience4j.circuitbreaker.instances.product-service.wait-duration-in-open-state=10s
# Stay OPEN for 10 seconds, then go HALF-OPEN to test recovery

resilience4j.circuitbreaker.instances.product-service.permitted-number-of-calls-in-half-open-state=2
# Send 2 probe calls in HALF-OPEN

resilience4j.circuitbreaker.instances.product-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.product-service.ignore-exceptions[0]=com.revature.springcloud.order_service.exception.ProductNotFoundException
# This is a BUSINESS exception (product genuinely doesn't exist)
# Don't open the circuit just because someone searched for a non-existent product

# ?? RETRY CONFIG ???????????????????????????????????????????????
resilience4j.retry.instances.product-service.max-attempts=3
resilience4j.retry.instances.product-service.wait-duration=500ms
resilience4j.retry.instances.product-service.enable-exponential-backoff=true
resilience4j.retry.instances.product-service.exponential-backoff-multiplier=2
# 1st retry: wait 500ms, 2nd retry: wait 1000ms, 3rd retry: wait 2000ms

# ?? MONITORING ?????????????????????????????????????????????????
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health,circuitbreakers
resilience4j.circuitbreaker.instances.product-service.register-health-indicator=true
